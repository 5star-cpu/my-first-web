<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒店通路供應鏈系統 | 獨立品牌官網</title>
    <style>
        /* 基礎重設與高奢配色變數 */
        :root {
            --bg-color: #0d0d0e;
            --card-bg: #141416;
            --text-primary: #ffffff;
            --text-secondary: #8a8a93;
            --accent-gold: #d4af37;
            --accent-gold-hover: #f3cf65;
            --border-color: rgba(212, 175, 55, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            letter-spacing: 0.05em;
        }

        /* 背景微光裝飾 */
        .glow-effect {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, rgba(13, 13, 14, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* 導覽列 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            border-left: 3px solid var(--accent-gold);
            padding-left: 12px;
        }

        .nav-tag {
            font-size: 0.85rem;
            color: var(--accent-gold);
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(212, 175, 55, 0.03);
        }

        /* 主視覺核心區塊 */
        .hero-section {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .system-badge {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--accent-gold);
            letter-spacing: 0.3em;
            margin-bottom: 24px;
            opacity: 0.9;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 24px;
            background: linear-gradient(180deg, #ffffff 30%, #a5a5a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.08em;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: 48px;
            font-weight: 300;
        }

        /* 質感行動呼籲按鈕 */
        .cta-button {
            display: inline-block;
            padding: 16px 40px;
            font-size: 1rem;
            font-weight: 600;
            color: #000000;
            background-color: var(--accent-gold);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.25);
            letter-spacing: 0.1em;
        }

        .cta-button:hover {
            background-color: var(--accent-gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(212, 175, 55, 0.4);
        }

        /* 草創過渡期特色說明框 */
        .notice-container {
            margin-top: 80px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 24px 40px;
            border-radius: 8px;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }

        .notice-container p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* 頁尾 */
        footer {
            text-align: center;
            padding: 40px 0;
            font-size: 0.8rem;
            color: #444448;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            z-index: 10;
        }

        /* 響應式網頁設計 (手機板優化) */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.3rem;
            }
            .subtitle {
                font-size: 1.1rem;
            }
            header {
                padding: 20px 5%;
            }
        }
    </style>
</head>
<body>

    <div class="glow-effect"></div>

    <header>
        <div class="logo">NEXT FLOW</div>
        <div class="nav-tag">Brand Official</div>
    </header>

    <section class="hero-section">
        <p class="system-badge">酒店通路供應鏈系統</p>
        <h1 class="main-title">解決酒店資金流的問題</h1>
        <p class="subtitle">妳出想法，其他全部交給我們。</p>
        
        <a href="mailto:your-email@example.com" class="cta-button">立即聯繫團隊</a>

        <div class="notice-container">
            <p>💡 專屬系統正在進行隱密部署。我們為草創時期的合作夥伴提供最頂級的客製化對接，若有業務需求請直接點擊上方與我們取得聯繫。</p>
        </div>
    </section>

    <footer>
        &copy; 2026 NEXT FLOW. All Rights Reserved. Private & Confidential.
    </footer>

</body>
</html>
