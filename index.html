<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一個一站式網頁</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #0070f3; }
        p { color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 哈囉，世界！</h1>
        <p>這是我從零開始製作的一站式網頁。</p>
        <p>等一下我要把它發布到網路上！</p>
    </div>

</body>
</html>
